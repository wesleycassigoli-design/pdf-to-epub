  :root{
    --bg:#ffffff; --panel:#ffffff; --panel2:#eeeeee; --line:#dddddd;
    --text:#2a2a2a; --muted:#767676; --accent:#ce0058;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Montserrat',system-ui,-apple-system,sans-serif;
    display:flex; min-height:100vh;
  }
  #panel{
    width:360px; flex-shrink:0; background:var(--panel);
    padding:20px; border-right:1px solid var(--line);
    overflow-y:auto; height:100vh;
  }
  #panel h1{font-size:16px; margin:0 0 4px; letter-spacing:.3px; font-weight:800; color:var(--text);}
  #panel .sub{font-size:12px; color:var(--muted); margin-bottom:18px;}
  .field{margin-bottom:16px;}
  .field label{
    display:block; font-size:11px; text-transform:uppercase;
    letter-spacing:.6px; color:var(--muted); margin-bottom:6px; font-weight:600;
  }
  input[type=text], textarea{
    width:100%; padding:9px 10px; border-radius:8px; border:1px solid var(--line);
    background:var(--panel2); color:var(--text); font-size:13px; outline:none;
    font-family:inherit;
  }
  textarea{resize:vertical; min-height:64px; line-height:1.4;}
  input[type=text]:focus, textarea:focus{border-color:var(--accent);}
  .row2{display:flex; gap:8px;}
  .row2 > div{flex:1;}
  .hint{font-size:11px; color:var(--muted); margin-top:4px; line-height:1.4;}

  #uploadLabel{
    display:block; width:100%; padding:10px; border-radius:8px; border:1px dashed var(--line);
    background:var(--panel2); color:var(--muted); font-size:12px; cursor:pointer; text-align:center;
  }
  #uploadLabel:hover{border-color:var(--accent); color:var(--text);}
  #fileInput{position:absolute; width:1px; height:1px; opacity:0; overflow:hidden;}
  #fileNameShown{font-size:11px; color:var(--accent); margin-top:6px;}

  #downloadBtn, #openTabBtn{
    width:100%; padding:13px; border-radius:9px; border:none;
    background:var(--accent); color:#fff; font-size:14px; font-weight:700;
    cursor:pointer; margin-top:8px;
  }
  #openTabBtn{background:#fff; color:#0057b8; border:1px solid #0057b8; font-weight:600; font-size:12px;}
  #downloadBtn:hover{filter:brightness(1.1);}

  #main{
    flex:1; display:flex; align-items:center; justify-content:center;
    padding:30px; background:#f7f7f7;
  }
  #canvasWrap{
    width:100%; max-width:960px; aspect-ratio:16/9; box-shadow:0 12px 32px rgba(0,0,0,.15);
    border-radius:6px; overflow:hidden; border:1px solid var(--line);
  }
  canvas{width:100%; height:100%; display:block;}
  .divider{height:1px; background:var(--line); margin:18px 0;}
  .badge{
    display:inline-block; background:var(--accent); color:#fff; font-size:11px;
    font-weight:700; padding:3px 9px; border-radius:20px; margin-bottom:14px;
  }
</style>
</head>
<body>

<div id="panel">
  <div class="badge">PÓS-GRADUAÇÃO</div>
  <h1>Gerador de Thumbs</h1>
  <div class="sub">Afya Educação Médica</div>

  <div class="field">
    <label>Título (uma linha por quebra)</label>
    <textarea id="titleField">TERCEIRIZAÇÃO E
SUAS CONSEQUÊNCIAS</textarea>
    <div class="hint">Aperta Enter pra quebrar a linha manualmente, igual no template.</div>
  </div>

  <div class="field">
    <label>Palestrante(s)</label>
    <input type="text" id="presenterField" value="Márcio Carvalho e Mariane G. Santos">
  </div>

  <div class="divider"></div>

  <div class="field">
    <div class="row2">
      <div>
        <label>Dia</label>
        <input type="text" id="dayField" value="05">
      </div>
      <div>
        <label>Mês (abrev.)</label>
        <input type="text" id="monthField" value="ago">
      </div>

  <div class="field">

      <div>
        <label>Minuto</label>
        <input type="text" id="minuteField" value="30">
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <button id="downloadBtn" type="button">Baixar PNG (1920×1080)</button>
  <button id="openTabBtn" type="button">Abrir imagem em nova aba (conferência)</button>
</div>

const TITLE_X = 52, TITLE_Y = TITLE_TOP + TITLE_SIZE*ASCENT_RATIO;
const PRESENTER_X = 45, PRESENTER_Y = PRESENTER_TOP + PRESENTER_SIZE*ASCENT_RATIO;
const DATE_X = 52, DATE_Y = DATE_TOP + DATE_SIZE*ASCENT_RATIO;
const TIME_X = 50, TIME_Y = TIME_TOP + TIME_SIZE*ASCENT_RATIO;

function render(){
  const W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);

  if(bgLoaded){
    ctx.drawImage(bgImg, 0, 0, W, H);
  } else {
    ctx.fillStyle = '#ce0058';
    ctx.fillRect(0,0,W,H);
  }

  // Título — várias linhas manuais, branco, ExtraBold
  ctx.fillStyle = '#ffffff';
  ctx.font = `800 ${TITLE_SIZE}px Montserrat`;
  const titleLines = (state.title || '').split('\n');
  titleLines.forEach((line, i)=>{
    ctx.fillText(line.toUpperCase(), TITLE_X, TITLE_Y + i*TITLE_SIZE*LINE_HEIGHT);
  });

  // Palestrante — branco, Medium (peso 500)
  ctx.font = `500 ${PRESENTER_SIZE}px Montserrat`;
  ctx.fillText(state.presenter || '', PRESENTER_X, PRESENTER_Y);

  // Data — dia em ExtraBold + "/mês" em Regular
  ctx.font = `800 ${DATE_SIZE}px Montserrat`;
  const dayText = state.day || '';
  ctx.fillText(dayText, DATE_X, DATE_Y);
  const dayWidth = ctx.measureText(dayText).width;
  ctx.font = `400 ${DATE_SIZE}px Montserrat`;
  ctx.fillText('/' + (state.month || ''), DATE_X + dayWidth, DATE_Y);

  // Hora — hora em ExtraBold + "hMM" em Regular
  ctx.font = `800 ${TIME_SIZE}px Montserrat`;
  const hourText = state.hour || '';
  ctx.fillText(hourText, TIME_X, TIME_Y);
  const hourWidth = ctx.measureText(hourText).width;
  ctx.font = `400 ${TIME_SIZE}px Montserrat`;
  ctx.fillText('h' + (state.minute || ''), TIME_X + hourWidth, TIME_Y);
}

document.getElementById('titleField').addEventListener('input', e=>{ state.title = e.target.value; render(); });
document.getElementById('presenterField').addEventListener('input', e=>{ state.presenter = e.target.value; render(); });
document.getElementById('dayField').addEventListener('input', e=>{ state.day = e.target.value; render(); });
document.getElementById('monthField').addEventListener('input', e=>{ state.month = e.target.value; render(); });
document.getElementById('hourField').addEventListener('input', e=>{ state.hour = e.target.value; render(); });
document.getElementById('minuteField').addEventListener('input', e=>{ state.minute = e.target.value; render(); });

document.getElementById('downloadBtn').addEventListener('click', ()=>{
  const dataUrl = cv.toDataURL('image/png');
  const link = document.createElement('a');
  link.download = `thumb-posgraduacao.png`;
  link.href = dataUrl;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});

document.getElementById('openTabBtn').addEventListener('click', ()=>{
  const dataUrl = cv.toDataURL('image/png');
  const w = window.open();
  if(w){
    w.document.write('<title>Conferência da thumb</title><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;"><img src="'+dataUrl+'" style="max-width:100%;height:auto;"></body>');
  } else {
    alert('O navegador bloqueou a nova aba. Permita pop-ups para este site ou use o botão de baixar PNG.');
  }
});

if(document.fonts && document.fonts.ready){
  document.fonts.ready.then(render);
}
render();
</script>
</body>
</html>
